name: DCO

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco:
    name: Developer Certificate of Origin
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Check DCO sign-off
        uses: KineticCafe/actions-dco@f7fe2fdfb5808e2528042be3919b67079100b96b  # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
